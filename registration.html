<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>litera| registration page</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="css/registration.css">
</head>
<body>
    <header>
        <h1 class="text-5xl ">Sign up today</h1>
    </header> 
    <br>
    <form action="/submit-data" method="post" class="form">
        <fieldset class="border-none">
          <legend>
            <strong><h2 class="font-sans text-xl leading-tight">create an account</h2></strong>
          </legend> <br>
          <p>Already have an account? log in <a href="login.html" class="font-sans text-lg leading-tight">here</a></p>
          <br>
          <div class="input">
            <label for="name" class="label">first name:</label> <br />
            <input
              type="text"
              id="name"
              name="name"
              placeholder="Enter Your first name"
              required />
          </div>
          
</body>
</html>
