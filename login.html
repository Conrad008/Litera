<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Litera | login portal</title>
    <link rel="stylesheet" href="css/login.css">
     <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  </head>
  <body>
    <header class="header">
      <strong><h1 class="text-5xl">Welcome Back</h1></strong>
    </header>
    <main class="glassmorphism">
      <form action="/submit-data" method="post" class="form">
        <fieldset class="border-none">
          <legend>
            <strong><h2 class="font-sans text-xl leading-tight">Log in to your account</h2></strong>
          </legend>
          <br />

          <div class="input">
            <label for="email" class="label">Email:</label> <br />
            <input
              type="email"
              id="email"
              name="email"
              placeholder="Enter Your Email"
              required
            />
          </div>
          <br />
          <div class="input">
            <label for="pass" class="label">Password:</label> <br />
            <input
              type="password"
              id="password"
              name="Password"
              placeholder="Enter your Password"
              required
              class="p-12 border-none"
            />
          </div>
          <br />
          <button type="submit" class="button">Login</button>
        </fieldset>
      </form>
    </main>
  </body>
</html>
