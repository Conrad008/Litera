<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Litera | login portal</title>
  </head>
  <body>
    <header>
      <strong><h1>Welcome Back</h1></strong>
    </header>
    <main class="glass-card">
      <form action="/submit-data" method="post" class="form">
        <fieldset class="fieldset">
          <legend>
            <strong><h2>Log in to your account</h2></strong>
          </legend>
          <br />

          <div class="input">
            <label for="email" class="label">Email:</label> <br />
            <input
              type="email"
              id="email"
              name="email"
              placeholder="Enter Your Email"
              required
            />
          </div>
          <br />
          <div class="input">
            <label for="pass" class="label">Password:</label> <br />
            <input
              type="password"
              id="password"
              name="Password"
              placeholder="Enter your Password"
              required
            />
          </div>
          <br />
          <button type="submit" class="button">Login</button>
        </fieldset>
      </form>
    </main>
  </body>
</html>
